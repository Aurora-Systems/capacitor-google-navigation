<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Google Navigation Plugin — Example</title>
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      body { font-family: sans-serif; padding: 16px; max-width: 480px; }
      label { display: block; margin-top: 12px; font-size: 0.85rem; color: #555; }
      input { width: 100%; padding: 6px 8px; margin-top: 4px; box-sizing: border-box; }
      button { margin-top: 10px; margin-right: 6px; padding: 8px 14px; cursor: pointer; }
      #log { margin-top: 16px; white-space: pre-wrap; background: #f4f4f4; padding: 10px; font-size: 0.8rem; min-height: 80px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h2>Google Navigation Plugin</h2>

    <label for="apiKeyInput">API Key</label>
    <input type="text" id="apiKeyInput" placeholder="AIza..." />
    <button onclick="testInitialize()">Initialize SDK</button>

    <label for="latInput">Destination Latitude</label>
    <input type="number" id="latInput" value="37.7749" step="any" />

    <label for="lngInput">Destination Longitude</label>
    <input type="number" id="lngInput" value="-122.4194" step="any" />

    <div>
      <button onclick="testShowView()">Show Navigation View</button>
      <button onclick="testStartNav()">Start Navigation</button>
      <button onclick="testStop()">Stop &amp; Hide</button>
    </div>

    <div id="log">Log output will appear here…</div>

    <script src="./js/example.js" type="module"></script>
  </body>
</html>
